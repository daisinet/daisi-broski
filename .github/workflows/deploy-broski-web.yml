name: Deploy Broski Web

# Mirrors the daisi-business-crm deploy pattern: on every push
# to main, publish Daisi.Broski.Web and push the zip to the
# Azure App Service instance. workflow_dispatch is there for
# manual re-runs with an explicit version string.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2026.04.15.1600)'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-broski-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for commit to finalize
        run: sleep 2

      - name: Checkout daisi-broski
        uses: actions/checkout@v4
        with:
          path: daisi-broski

      - name: Checkout daisi-sdk-dotnet
        uses: actions/checkout@v4
        with:
          repository: daisinet/daisi-sdk-dotnet
          token: ${{ secrets.SDK_PAT }}
          path: daisi-sdk-dotnet

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=1.0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish Daisi.Broski.Web
        run: dotnet publish daisi-broski/src/dotnet/Daisi.Broski.Web -c Release /p:Version=${{ steps.version.outputs.value }}

      - name: Package app
        run: cd daisi-broski/src/dotnet/Daisi.Broski.Web/bin/Release/net10.0/publish && zip -r $GITHUB_WORKSPACE/deploy.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp deploy \
              --name daisi-broski-web-prod \
              --resource-group daisi-prod-rg \
              --src-path $GITHUB_WORKSPACE/deploy.zip \
              --type zip
